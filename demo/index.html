<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AegisCV Prototype Demo</title>

<style>

body{
margin:0;
font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
color:white;

background:
radial-gradient(circle at 20% 20%, #1a2a45 0%, transparent 40%),
radial-gradient(circle at 80% 30%, #0d1b2a 0%, transparent 40%),
linear-gradient(180deg,#05080f,#020409);
}

.container{
max-width:900px;
margin:auto;
padding:80px 30px;
text-align:center;
}

h1{
font-size:40px;
margin-bottom:10px;
}

p{
color:#9aa4b2;
margin-bottom:40px;
font-size:18px;
}

.card{
background:rgba(255,255,255,0.05);
border:1px solid rgba(255,255,255,0.08);
border-radius:14px;
padding:20px;
backdrop-filter: blur(10px);
}

.video{
position:relative;
padding-bottom:56.25%;
height:0;
overflow:hidden;
border-radius:10px;
}

.video iframe{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
border:0;
}

.footer{
margin-top:40px;
color:#7c8798;
font-size:14px;
}

</style>
</head>

<body>

<div class="container">

<h1>AegisCV Prototype Demo</h1>

<p>
AI-powered real-time loss prevention for fashion retail
</p>

<div class="card">

<div class="video">
<iframe src="https://www.youtube.com/embed/Xi4OLB7EhGo" allowfullscreen></iframe>
</div>

</div>

<div class="footer">
aegiscv.com
</div>

</div>

</body>
</html>
